<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Issues Tracker</title>
<!-- google fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!-- daisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="styles/styles.css" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
          },
          colors: {
            primaryPurple: '#5B21FF',
            softBg: '#F4F5F7',
            darkText: '#1F2937',
            mutedText: '#64748B',
            openGreen: '#10B981',
            closedPurple: '#A855F7',
          }
        }
      }
    }
  </script>
</head>
<body class="font-inter bg-[#F3F4F6] text-[#1F2937]">

  <!-- Login Page -->
  <section id="loginPage" class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-[530px] bg-white rounded-2xl shadow-[0_8px_30px_rgba(0,0,0,0.06)] p-8 md:p-10">
      <div class="flex flex-col items-center text-center">
        <div class="w-24 h-24 rounded-full bg-slate-800 flex items-center justify-center text-white text-5xl mb-5">
          <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="w-14 h-14" viewBox="0 0 24 24">
            <path d="M12 .5C5.65.5.5 5.66.5 12.03c0 5.1 3.3 9.43 7.88 10.96.58.1.79-.25.79-.56 0-.28-.01-1.03-.02-2.01-3.2.7-3.88-1.54-3.88-1.54-.53-1.34-1.29-1.7-1.29-1.7-1.05-.72.08-.7.08-.7 1.17.08 1.78 1.2 1.78 1.2 1.03 1.77 2.71 1.26 3.37.97.1-.76.4-1.26.73-1.55-2.56-.29-5.25-1.28-5.25-5.7 0-1.26.45-2.3 1.19-3.12-.12-.29-.52-1.47.11-3.07 0 0 .97-.31 3.18 1.19a11.1 11.1 0 0 1 5.78 0c2.2-1.5 3.18-1.19 3.18-1.19.63 1.6.23 2.78.11 3.07.74.82 1.19 1.86 1.19 3.12 0 4.43-2.69 5.4-5.26 5.69.41.36.78 1.09.78 2.2 0 1.59-.01 2.87-.01 3.26 0 .31.21.67.8.56 4.57-1.53 7.87-5.86 7.87-10.96C23.5 5.66 18.35.5 12 .5Z"/>
          </svg>
        </div>

        <h1 class="text-4xl font-extrabold mb-2">GitHub Issues Tracker</h1>
        <p class="text-slate-500 text-lg mb-8">Sign in to manage your issues</p>
      </div>

      <form id="loginForm" class="space-y-5">
        <div>
          <label class="block text-xl font-semibold mb-2">Username</label>
          <input id="username" type="text" placeholder="Enter Username"
            class="input input-bordered w-full h-14 text-lg rounded-xl bg-white border-slate-200" />
          <p class="text-primaryPurple text-base mt-2">Default: admin</p>
        </div>

        <div>
          <label class="block text-xl font-semibold mb-2">Password</label>
          <input id="password" type="password" placeholder="Enter Password"
            class="input input-bordered w-full h-14 text-lg rounded-xl bg-white border-slate-200" />
          <p class="text-primaryPurple text-base mt-2">Default: admin123</p>
        </div>

        <button type="submit"
          class="btn w-full h-14 rounded-xl border-0 text-white text-xl font-bold bg-gradient-to-r from-[#6610F2] to-[#4B00FF] shadow-none">
          Sign In
        </button>

        <p id="loginError" class="text-red-500 text-center font-medium"></p>

        <div class="flex items-center gap-4 py-2">
          <div class="h-px flex-1 bg-slate-200"></div>
          <span class="text-slate-500 text-lg">OR</span>
          <div class="h-px flex-1 bg-slate-200"></div>
        </div>

        <div class="bg-[#F7F7F8] rounded-xl p-6 text-center">
          <p class="text-slate-500 mb-4 text-lg">Demo Credentials:</p>
          <p class="text-2xl"><span class="font-extrabold">Username:</span> admin</p>
          <p class="text-2xl"><span class="font-extrabold">Password:</span> admin123</p>
        </div>
      </form>
    </div>
  </section>

  <!-- Main Page -->
  <section id="mainPage" class="hidden min-h-screen">
    <!-- Navbar -->
    <header class="bg-white border-b border-slate-200">
      <div class="max-w-[1360px] mx-auto px-4 md:px-8 py-5 flex flex-col lg:flex-row gap-4 lg:gap-0 lg:items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="text-slate-800">
            <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="w-12 h-12" viewBox="0 0 24 24">
              <path d="M12 .5C5.65.5.5 5.66.5 12.03c0 5.1 3.3 9.43 7.88 10.96.58.1.79-.25.79-.56 0-.28-.01-1.03-.02-2.01-3.2.7-3.88-1.54-3.88-1.54-.53-1.34-1.29-1.7-1.29-1.7-1.05-.72.08-.7.08-.7 1.17.08 1.78 1.2 1.78 1.2 1.03 1.77 2.71 1.26 3.37.97.1-.76.4-1.26.73-1.55-2.56-.29-5.25-1.28-5.25-5.7 0-1.26.45-2.3 1.19-3.12-.12-.29-.52-1.47.11-3.07 0 0 .97-.31 3.18 1.19a11.1 11.1 0 0 1 5.78 0c2.2-1.5 3.18-1.19 3.18-1.19.63 1.6.23 2.78.11 3.07.74.82 1.19 1.86 1.19 3.12 0 4.43-2.69 5.4-5.26 5.69.41.36.78 1.09.78 2.2 0 1.59-.01 2.87-.01 3.26 0 .31.21.67.8.56 4.57-1.53 7.87-5.86 7.87-10.96C23.5 5.66 18.35.5 12 .5Z"/>
            </svg>
          </div>
          <h2 class="text-2xl md:text-[28px] font-extrabold">GitHub Issues Tracker</h2>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 items-stretch sm:items-center">
          <label class="input input-bordered flex items-center gap-2 h-12 rounded-lg w-full sm:w-[300px] lg:w-[340px] bg-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-60" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m21 21-4.35-4.35m1.85-5.15a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z" />
            </svg>
            <input id="searchInput" type="text" class="grow text-base" placeholder="Search issues..." />
          </label>

          <button id="searchBtn" class="btn h-12 px-5 rounded-lg border border-slate-200 bg-white text-slate-700 hover:bg-slate-50">
            Search
          </button>

          <button class="btn h-12 px-6 rounded-lg border-0 text-white bg-gradient-to-r from-[#6610F2] to-[#4B00FF]">
            + New Issue
          </button>

          <button id="logoutBtn" class="btn h-12 px-5 rounded-lg bg-red-500 border-0 text-white">
            Logout
          </button>
        </div>
      </div>
    </header>

    <main class="max-w-[1060px] mx-auto px-4 py-10">
      <!-- Tabs -->
      <section class="bg-white rounded-xl border border-slate-200 p-4 md:p-5 mb-5">
        <div class="flex gap-2 flex-wrap">
          <button class="tab-btn btn min-w-[90px] h-12 rounded-md border-slate-200 bg-white text-slate-500 active-tab" data-tab="all">All</button>
          <button class="tab-btn btn min-w-[90px] h-12 rounded-md border-slate-200 bg-white text-slate-500" data-tab="open">Open</button>
          <button class="tab-btn btn min-w-[90px] h-12 rounded-md border-slate-200 bg-white text-slate-500" data-tab="closed">Closed</button>
        </div>
      </section>

      <!-- Issue header -->
      <section class="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div class="p-5 md:p-6 flex flex-col md:flex-row md:items-center justify-between gap-4 border-b border-slate-200">
          <div class="flex items-start gap-4">
            <div class="w-12 h-12 rounded-full bg-[#F0E9FF] flex items-center justify-center text-[#6D28D9]">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M10.5 6h9m-9 6h9m-9 6h9M4.5 6h.01M4.5 12h.01M4.5 18h.01" />
              </svg>
            </div>

            <div>
              <h3 id="issueCount" class="text-3xl font-extrabold">0 Issues</h3>
              <p class="text-slate-500 text-lg">Track and manage your project issues</p>
            </div>
          </div>

          <div class="flex items-center gap-5 text-lg">
            <div class="flex items-center gap-2">
              <span class="w-3 h-3 rounded-full bg-emerald-500 inline-block"></span>
              <span>Open</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="w-3 h-3 rounded-full bg-violet-500 inline-block"></span>
              <span>Closed</span>
            </div>
          </div>
        </div>

        <div id="spinner" class="hidden py-16 flex justify-center">
          <span class="loading loading-spinner loading-lg text-primary"></span>
        </div>

        <div id="issuesContainer" class="p-4 md:p-5 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
      </section>
    </main>
  </section>

  <!-- Modal -->
  <dialog id="issueModal" class="modal">
    <div class="modal-box max-w-2xl rounded-2xl">
      <form method="dialog">
        <button class="btn btn-sm btn-circle btn-ghost absolute right-4 top-4">✕</button>
      </form>
      <div id="modalBody"></div>
    </div>
    <form method="dialog" class="modal-backdrop">
      <button>close</button>
    </form>
  </dialog>

  <script src="script.js/index.js"></script>
</body>
</html>
